openapi: 3.0.0
info:
  title: rustBangumi Downloader (PikPak) Service API
  description: |
    PikPak 雲端離線 Downloader 服務 API 規格。
    支援 magnet link 與 HTTP URL 的雲端離線下載，完成後自動 streaming 至本機。
    服務啟動時向 Core 註冊，廣告支援的 DownloadType（Magnet）。

    **注意**：pause 與 resume 端點為 no-op（PikPak 不支援暫停），固定回傳 200。
  version: 0.1.0
  contact:
    name: rustBangumi Project
  license:
    name: MIT

servers:
  - url: 'http://{host}:{port}'
    description: rustBangumi PikPak Downloader
    variables:
      host:
        default: localhost
        description: 主機名稱（Docker 環境請改為 pikpak-downloader）
      port:
        default: '8006'
        description: 服務端口

tags:
  - name: Health
    description: 服務健康檢查
  - name: Downloads
    description: 下載任務管理
  - name: Config
    description: 服務設定（PikPak 帳號）

paths:
  /health:
    get:
      tags:
        - Health
      summary: 健康檢查
      operationId: getHealth
      responses:
        '200':
          description: 服務正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /downloads:
    post:
      tags:
        - Downloads
      summary: 批次新增下載任務
      description: 透過 PikPak 雲端離線批次新增下載任務，支援 magnet link 或 HTTP URL
      operationId: batchAddDownloads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDownloadRequest'
            examples:
              magnet:
                summary: 使用 magnet link
                value:
                  items:
                    - url: "magnet:?xt=urn:btih:abc123def456&dn=Example+Torrent"
                      save_path: "/downloads/bangumi/example"
      responses:
        '200':
          description: 批次新增結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDownloadResponse'

    get:
      tags:
        - Downloads
      summary: 查詢下載狀態
      operationId: queryDownloadStatus
      parameters:
        - name: hashes
          in: query
          required: true
          description: 以逗號分隔的任務 hash 列表
          schema:
            type: string
          example: "abc123def456,789xyz000111"
      responses:
        '200':
          description: 下載狀態查詢結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusQueryResponse'

  /downloads/cancel:
    post:
      tags:
        - Downloads
      summary: 批次取消下載
      operationId: batchCancelDownloads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCancelRequest'
      responses:
        '200':
          description: 批次取消結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCancelResponse'

  /downloads/{hash}/pause:
    post:
      tags:
        - Downloads
      summary: 暫停下載（no-op）
      description: PikPak 不支援暫停，固定回傳 200
      operationId: pauseDownload
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          example: "abc123def456"
      responses:
        '200':
          description: 已接受（no-op）

  /downloads/{hash}/resume:
    post:
      tags:
        - Downloads
      summary: 恢復下載（no-op）
      description: PikPak 不支援暫停/恢復，固定回傳 200
      operationId: resumeDownload
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          example: "abc123def456"
      responses:
        '200':
          description: 已接受（no-op）

  /downloads/{hash}:
    delete:
      tags:
        - Downloads
      summary: 刪除下載
      operationId: deleteDownload
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
          example: "abc123def456"
        - name: delete_files
          in: query
          required: false
          description: 是否同時刪除本機已下載的檔案（預設 false）
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: 已刪除

  /config/credentials:
    post:
      tags:
        - Config
      summary: 設定 PikPak 帳號密碼
      description: |
        動態更新 PikPak 登入帳號密碼。更新成功後自動重新登入並啟動輪詢。
        也可透過環境變數 `PIKPAK_EMAIL` / `PIKPAK_PASSWORD` 在啟動時設定。
      operationId: setCredentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetCredentialsRequest'
            examples:
              credentials:
                value:
                  username: "your@email.com"
                  password: "yourpassword"
      responses:
        '200':
          description: 憑證已更新，重新登入中
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Credentials updated successfully"

components:
  schemas:
    BatchDownloadRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DownloadItem'

    DownloadItem:
      type: object
      required:
        - url
        - save_path
      properties:
        url:
          type: string
          description: Magnet link 或 HTTP URL
          example: "magnet:?xt=urn:btih:abc123def456&dn=Example+Torrent"
        save_path:
          type: string
          example: "/downloads/bangumi/example"

    BatchDownloadResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/DownloadResult'

    DownloadResult:
      type: object
      required:
        - url
        - status
      properties:
        url:
          type: string
          example: "magnet:?xt=urn:btih:abc123def456"
        hash:
          type: string
          nullable: true
          description: 任務 hash（成功時回傳）
          example: "abc123def456"
        status:
          type: string
          enum: [success, failed]
          example: "success"
        reason:
          type: string
          nullable: true
          example: null

    StatusQueryResponse:
      type: object
      required:
        - statuses
      properties:
        statuses:
          type: array
          items:
            $ref: '#/components/schemas/DownloadStatus'

    DownloadStatus:
      type: object
      required:
        - hash
        - status
        - progress
        - size
      properties:
        hash:
          type: string
          example: "abc123def456"
        status:
          type: string
          description: downloading / completed / paused / error
          example: "downloading"
        progress:
          type: number
          format: double
          minimum: 0
          maximum: 1
          example: 0.45
        size:
          type: integer
          format: int64
          description: 檔案總大小（bytes）
          example: 1073741824
        content_path:
          type: string
          nullable: true
          description: 下載完成後的本機檔案路徑
          example: "/downloads/bangumi/example/episode01.mkv"

    BatchCancelRequest:
      type: object
      required:
        - hashes
      properties:
        hashes:
          type: array
          items:
            type: string
          example:
            - "abc123def456"

    BatchCancelResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/CancelResult'

    CancelResult:
      type: object
      required:
        - hash
        - status
      properties:
        hash:
          type: string
          example: "abc123def456"
        status:
          type: string
          example: "cancelled"

    SetCredentialsRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: PikPak 帳號（Email）
          example: "your@email.com"
        password:
          type: string
          description: PikPak 密碼
          example: "yourpassword"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: "Invalid request format"
