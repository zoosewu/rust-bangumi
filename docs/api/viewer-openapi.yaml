openapi: 3.0.0
info:
  title: rustBangumi Viewer (Jellyfin) Service API
  description: |
    Viewer Jellyfin 服務 API 規格。
    負責將已完成下載的動畫檔案整理至 Jellyfin 媒體庫，並從 bangumi.tv 取得 metadata 與產生 NFO 檔案。

    **非同步回呼流程：**
    1. Core 發送 `POST /sync` 請求
    2. Viewer 立即回傳 `202 Accepted`
    3. 背景執行：檔案搬移 → bangumi.tv metadata 查詢 → NFO 產生
    4. 完成後向 `callback_url`（Core 的 `/sync-callback`）發送結果通知
  version: 0.2.0
  contact:
    name: rustBangumi Project
  license:
    name: MIT

servers:
  - url: 'http://{host}:{port}'
    description: rustBangumi Viewer (Jellyfin)
    variables:
      host:
        default: localhost
        description: 主機名稱（Docker 環境請改為 viewer-jellyfin）
      port:
        default: '8003'
        description: 服務端口

tags:
  - name: Health
    description: 服務健康檢查
  - name: Sync
    description: 檔案同步與整理

paths:
  /health:
    get:
      tags:
        - Health
      summary: 健康檢查
      operationId: getHealth
      responses:
        '200':
          description: 服務正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    status: "healthy"
                    service: "jellyfin-viewer"
                    version: "0.2.0"

  /sync:
    post:
      tags:
        - Sync
      summary: 接收同步請求
      description: |
        接收 Core 的同步請求（非同步）。

        背景處理流程：
        - 搬移下載檔案至 Jellyfin 媒體庫目錄
        - 從 bangumi.tv 取得 metadata（封面、簡介）
        - 產生 NFO 檔案
        - 完成後回呼 `callback_url`
      operationId: receiveSync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewerSyncRequest'
            examples:
              syncEpisode:
                summary: 同步單集動畫
                value:
                  download_id: 42
                  series_id: 3215
                  anime_title: "葬送的芙莉蓮"
                  series_no: 1
                  episode_no: 12
                  subtitle_group: "喵萌奶茶屋"
                  file_path: "/downloads/[Nekomoe kissaten][Sousou no Frieren][12][1080p].mkv"
                  callback_url: "http://core-service:8000/sync-callback"
      responses:
        '202':
          description: 同步任務已接受

  /resync:
    post:
      tags:
        - Sync
      summary: 重新同步
      description: |
        重新整理已同步過的檔案（例如 metadata 更新、NFO 重新產生）。
        使用與 `/sync` 相同的請求結構，但 `old_target_path` 為必填。
      operationId: resync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewerResyncRequest'
            examples:
              resyncEpisode:
                summary: 重新同步單集
                value:
                  download_id: 42
                  series_id: 3215
                  anime_title: "葬送的芙莉蓮"
                  series_no: 1
                  episode_no: 12
                  subtitle_group: "喵萌奶茶屋"
                  old_target_path: "/media/anime/葬送的芙莉蓮/Season 1/葬送的芙莉蓮 S01E12.mkv"
                  callback_url: "http://core-service:8000/sync-callback"
      responses:
        '202':
          description: 重新同步任務已接受

  /delete:
    post:
      tags:
        - Sync
      summary: 刪除已同步檔案
      description: 刪除 Viewer 已整理到媒體庫的檔案，並清除對應的 NFO 等 metadata 檔案
      operationId: deleteSynced
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViewerDeleteRequest'
            examples:
              deleteMultiple:
                summary: 刪除多個下載
                value:
                  download_ids: [42, 43, 44]
      responses:
        '200':
          description: 刪除結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewerDeleteResponse'
              examples:
                result:
                  value:
                    deleted:
                      - download_id: 42
                        success: true
                        deleted_path: "/media/anime/葬送的芙莉蓮/Season 1/葬送的芙莉蓮 S01E12.mkv"
                        error_message: null
                      - download_id: 43
                        success: false
                        deleted_path: null
                        error_message: "File not found"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          example: "healthy"
        service:
          type: string
          example: "jellyfin-viewer"
        version:
          type: string
          example: "0.2.0"

    ViewerSyncRequest:
      type: object
      required:
        - download_id
        - series_id
        - anime_title
        - series_no
        - episode_no
        - subtitle_group
        - file_path
        - callback_url
      properties:
        download_id:
          type: integer
          description: 下載記錄 ID
          example: 42
        series_id:
          type: integer
          description: 系列 ID
          example: 3215
        anime_title:
          type: string
          example: "葬送的芙莉蓮"
        series_no:
          type: integer
          description: 季數編號
          example: 1
        episode_no:
          type: integer
          description: 集數編號
          example: 12
        subtitle_group:
          type: string
          description: 字幕組名稱
          example: "喵萌奶茶屋"
        file_path:
          type: string
          description: 已下載的原始檔案路徑
          example: "/downloads/[Nekomoe kissaten][Sousou no Frieren][12][1080p].mkv"
        callback_url:
          type: string
          format: uri
          description: 處理完成後的回呼 URL
          example: "http://core-service:8000/sync-callback"

    ViewerResyncRequest:
      type: object
      required:
        - download_id
        - series_id
        - anime_title
        - series_no
        - episode_no
        - subtitle_group
        - old_target_path
        - callback_url
      properties:
        download_id:
          type: integer
          example: 42
        series_id:
          type: integer
          example: 3215
        anime_title:
          type: string
          example: "葬送的芙莉蓮"
        series_no:
          type: integer
          example: 1
        episode_no:
          type: integer
          example: 12
        subtitle_group:
          type: string
          example: "喵萌奶茶屋"
        old_target_path:
          type: string
          description: 原已同步的檔案路徑（重新同步前的位置）
          example: "/media/anime/葬送的芙莉蓮/Season 1/葬送的芙莉蓮 S01E12.mkv"
        callback_url:
          type: string
          format: uri
          example: "http://core-service:8000/sync-callback"

    ViewerDeleteRequest:
      type: object
      required:
        - download_ids
      properties:
        download_ids:
          type: array
          description: 要刪除的下載記錄 ID 列表
          items:
            type: integer
          example: [42, 43, 44]

    ViewerDeleteResponse:
      type: object
      required:
        - deleted
      properties:
        deleted:
          type: array
          items:
            $ref: '#/components/schemas/ViewerDeleteResult'

    ViewerDeleteResult:
      type: object
      required:
        - download_id
        - success
      properties:
        download_id:
          type: integer
          example: 42
        success:
          type: boolean
          example: true
        deleted_path:
          type: string
          nullable: true
          description: 已刪除的檔案路徑（成功時回傳）
          example: "/media/anime/葬送的芙莉蓮/Season 1/葬送的芙莉蓮 S01E12.mkv"
        error_message:
          type: string
          nullable: true
          description: 錯誤訊息（失敗時回傳）
          example: null

    ViewerSyncCallback:
      type: object
      description: |
        Viewer 處理完成後 POST 至 Core `/sync-callback` 的 body。
        此 schema 描述 Viewer 主動發出的回呼請求，非 Viewer 本身的回應。
      required:
        - download_id
        - status
      properties:
        download_id:
          type: integer
          example: 42
        status:
          type: string
          enum: [synced, failed]
          example: "synced"
        target_path:
          type: string
          nullable: true
          description: 搬移後的目標路徑（成功時回傳）
          example: "/media/anime/葬送的芙莉蓮/Season 1/葬送的芙莉蓮 S01E12.mkv"
        error_message:
          type: string
          nullable: true
          description: 錯誤訊息（失敗時回傳）
          example: null

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: "Invalid request format"
