version: '3.8'

# ============================================================================
# 生產環境可選服務
# ============================================================================
# 此檔案用於添加可選的外部服務（qBittorrent、Jellyfin）
# 使用方式：
#   docker compose -f docker-compose.yaml -f docker-compose.override.yaml up -d
# ============================================================================

services:
  # ============================================================================
  # qBittorrent 設定初始化
  # ============================================================================
  # qBittorrent 的 qBittorrent.conf 是 runtime state（WebUI 與 Core 都會寫入），
  # 因此無法唯讀掛載 configs/qbittorrent/prod.conf。改為首次啟動時複製過去，
  # 讓新部署直接獲得與生產一致的設定（特別是佇列相關設定，見該目錄 README）。
  #
  # 冪等：設定已存在時不覆蓋，保留既有環境的 runtime 調整。
  qbittorrent-init:
    image: alpine:3.20
    container_name: bangumi-qbittorrent-init
    user: root
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ${QBITTORRENT_CONFIG_DIR:?QBITTORRENT_CONFIG_DIR is required}:/config
      - ./configs/qbittorrent/prod.conf:/template.conf:ro
    command:
      - sh
      - -c
      - |
        set -e
        target=/config/qBittorrent/qBittorrent.conf
        if [ -f "$$target" ]; then
          echo "qBittorrent 設定已存在，保留現有設定"
        else
          echo "初始化 qBittorrent 設定（來自 configs/qbittorrent/prod.conf）"
          mkdir -p /config/qBittorrent
          cp /template.conf "$$target"
          chown -R "$${PUID}:$${PGID}" /config/qBittorrent
        fi
    restart: "no"

  # ============================================================================
  # qBittorrent - 下載管理
  # ============================================================================
  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: bangumi-qbittorrent
    depends_on:
      qbittorrent-init:
        condition: service_completed_successfully
    environment:
      WEBUI_PORT: ${QBITTORRENT_WEBUI_PORT:-8080}
      TORRENTING_PORT: ${QBITTORRENT_DHT_PORT:-16881}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Taipei}
    ports:
      - "${QBITTORRENT_WEBUI_PORT:-8080}:${QBITTORRENT_WEBUI_PORT:-8080}"
      - "${QBITTORRENT_DHT_PORT:-16881}:${QBITTORRENT_DHT_PORT:-16881}"
      - "${QBITTORRENT_DHT_PORT:-16881}:${QBITTORRENT_DHT_PORT:-16881}/udp"
    volumes:
      - ${QBITTORRENT_CONFIG_DIR:?QBITTORRENT_CONFIG_DIR is required}:/config
      - ${DOWNLOADS_DIR:?DOWNLOADS_DIR is required}:/downloads
    networks:
      bangumi-network:
        ipv4_address: 172.25.0.20
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${QBITTORRENT_WEBUI_PORT:-8080}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================================
  # Jellyfin - 媒體服務器
  # ============================================================================
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: bangumi-jellyfin
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
      - "${JELLYFIN_DISCOVERY_PORT:-7359}:7359/udp"
    volumes:
      - ${JELLYFIN_CONFIG_DIR:?JELLYFIN_CONFIG_DIR is required}:/config
      - ${JELLYFIN_CACHE_DIR:?JELLYFIN_CACHE_DIR is required}:/cache
      - ${JELLYFIN_LIBRARY_DIR:?JELLYFIN_LIBRARY_DIR is required}:/media/jellyfin:ro
    networks:
      bangumi-network:
        ipv4_address: 172.25.0.21
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
