openapi: 3.0.0
info:
  title: rustBangumi Mikanani Fetcher API
  description: Mikanani 特化 Fetcher 服務 API 規格 - 爬取和解析 Mikanani 動畫 RSS 源
  version: 0.3.0
  contact:
    name: rustBangumi Project
  license:
    name: MIT

servers:
  - url: 'http://{host}:{port}'
    description: rustBangumi Mikanani Fetcher
    variables:
      host:
        default: localhost
        description: 主機名稱（Docker 環境請改為 fetcher-mikanani）
      port:
        default: '8001'
        description: 服務端口

tags:
  - name: Health
    description: 服務健康檢查
  - name: Fetch
    description: RSS 爬取功能（Mikanani 專用）
  - name: Search
    description: 動畫搜尋功能
  - name: Ownership
    description: URL 歸屬檢查

paths:
  /health:
    get:
      tags:
        - Health
      summary: 健康檢查
      operationId: getHealth
      responses:
        '200':
          description: 服務正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'

  /fetch:
    post:
      tags:
        - Fetch
      summary: 觸發 Mikanani RSS 爬取
      description: |
        觸發 Mikanani RSS 爬取任務（非同步）。

        **支援的 URL 格式：**
        - `https://mikanani.me/RSS/Bangumi?bangumiId=<id>`
        - `https://mikanani.me/RSS/Bangumi?status=2&subgroupid=<id>`

        完成後回呼 `callback_url`（Core 的 `/raw-fetcher-results`）。
      operationId: triggerMikananiFetch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchTriggerRequest'
            examples:
              byBangumiId:
                summary: 使用 Bangumi ID 爬取
                value:
                  subscription_id: 123
                  rss_url: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
                  callback_url: "http://core-service:8000/raw-fetcher-results"
              bySubgroup:
                summary: 使用字幕組 ID 爬取
                value:
                  subscription_id: 456
                  rss_url: "https://mikanani.me/RSS/Bangumi?status=2&subgroupid=583"
                  callback_url: "http://core-service:8000/raw-fetcher-results"
      responses:
        '202':
          description: 爬取任務已接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchTriggerResponse'
        '400':
          description: 請求格式錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search:
    post:
      tags:
        - Search
      summary: 搜尋動畫
      description: 從 Mikanani 網站搜尋動畫，回傳結果列表與 detail_key 以供後續查詢
      operationId: searchAnime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              searchTitle:
                summary: 搜尋動畫標題
                value:
                  query: "葬送的芙莉蓮"
      responses:
        '200':
          description: 搜尋結果列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              examples:
                results:
                  value:
                    results:
                      - title: "葬送的芙莉蓮"
                        thumbnail_url: "https://mikanani.me/images/Bangumi/202309/xxx.jpg"
                        detail_key: "bangumi:3822"
        '400':
          description: 請求格式錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /detail:
    post:
      tags:
        - Search
      summary: 取得動畫詳情
      description: 根據 detail_key 取得各字幕組的 RSS URL 列表
      operationId: getMikananiDetail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetailRequest'
            examples:
              byDetailKey:
                summary: 以 bangumi ID 查詢
                value:
                  detail_key: "bangumi:3822"
              bySourceKey:
                summary: 以 source key 查詢
                value:
                  detail_key: "source:[KITA]金牌得主"
      responses:
        '200':
          description: 字幕組與 RSS URL 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                results:
                  value:
                    items:
                      - subgroup_name: "喵萌奶茶屋"
                        rss_url: "https://mikanani.me/RSS/Bangumi?bangumiId=3822&subgroupid=583"
                      - subgroup_name: "LoliHouse"
                        rss_url: "https://mikanani.me/RSS/Bangumi?bangumiId=3822&subgroupid=615"
        '400':
          description: 請求格式錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /can-handle-subscription:
    post:
      tags:
        - Ownership
      summary: 檢查 URL 歸屬
      description: |
        檢查此 Mikanani Fetcher 是否可以處理指定的訂閱 URL。
        接受條件：URL 包含 `mikanani.me` 且 `source_type` 為 `rss`。
      operationId: canHandleMikananiSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CanHandleRequest'
            examples:
              mikananiUrl:
                summary: Mikanani URL（可處理）
                value:
                  source_url: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
                  source_type: "rss"
              otherUrl:
                summary: 非 Mikanani URL（不可處理）
                value:
                  source_url: "https://example.com/rss"
                  source_type: "rss"
      responses:
        '200':
          description: 可以處理此 URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanHandleResponse'
              examples:
                canHandle:
                  value:
                    can_handle: true
        '204':
          description: 無法處理此 URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanHandleResponse'
              examples:
                cannotHandle:
                  value:
                    can_handle: false

components:
  schemas:
    FetchTriggerRequest:
      type: object
      required:
        - subscription_id
        - rss_url
        - callback_url
      properties:
        subscription_id:
          type: integer
          example: 123
        rss_url:
          type: string
          format: uri
          pattern: '^https?://mikanani\.me/RSS/.*'
          example: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
        callback_url:
          type: string
          format: uri
          example: "http://core-service:8000/raw-fetcher-results"

    FetchTriggerResponse:
      type: object
      required:
        - accepted
        - message
      properties:
        accepted:
          type: boolean
          example: true
        message:
          type: string
          example: "Fetch task accepted for subscription 123"

    SearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: 搜尋關鍵字
          example: "葬送的芙莉蓮"

    SearchResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'

    SearchResult:
      type: object
      required:
        - title
        - detail_key
      properties:
        title:
          type: string
          example: "葬送的芙莉蓮"
        thumbnail_url:
          type: string
          nullable: true
          example: "https://mikanani.me/images/Bangumi/202309/xxx.jpg"
        detail_key:
          type: string
          description: 用於 /detail 的不透明 key（例如 bangumi:3822 或 source:[KITA]...）
          example: "bangumi:3822"

    DetailRequest:
      type: object
      required:
        - detail_key
      properties:
        detail_key:
          type: string
          example: "bangumi:3822"

    DetailResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DetailItem'

    DetailItem:
      type: object
      required:
        - subgroup_name
        - rss_url
      properties:
        subgroup_name:
          type: string
          example: "喵萌奶茶屋"
        rss_url:
          type: string
          format: uri
          example: "https://mikanani.me/RSS/Bangumi?bangumiId=3822&subgroupid=583"

    CanHandleRequest:
      type: object
      required:
        - source_url
        - source_type
      properties:
        source_url:
          type: string
          format: uri
          example: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
        source_type:
          type: string
          example: "rss"

    CanHandleResponse:
      type: object
      required:
        - can_handle
      properties:
        can_handle:
          type: boolean
          example: true

    HealthCheckResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
          example: "ok"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: "Invalid request format"
