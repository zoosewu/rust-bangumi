openapi: 3.0.0
info:
  title: rustBangumi Fetcher Service API
  description: Fetcher 服務通用 API 規格 - 用於爬取和解析動畫 RSS 源
  version: 0.3.0
  contact:
    name: rustBangumi Project
  license:
    name: MIT

servers:
  - url: 'http://{host}:{port}'
    description: rustBangumi Fetcher Service
    variables:
      host:
        default: localhost
        description: 主機名稱（Docker 環境請改為服務名稱，例如 fetcher-mikanani）
      port:
        default: '8001'
        description: 服務端口

tags:
  - name: Health
    description: 服務健康檢查
  - name: Fetch
    description: RSS 爬取功能
  - name: Search
    description: 動畫搜尋功能
  - name: Ownership
    description: URL 歸屬檢查

paths:
  /health:
    get:
      tags:
        - Health
      summary: 健康檢查
      description: 檢查 Fetcher 服務是否正常運行
      operationId: getHealth
      responses:
        '200':
          description: 服務正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /fetch:
    post:
      tags:
        - Fetch
      summary: 觸發 RSS 爬取
      description: |
        觸發 RSS 爬取任務。此端點為非同步操作：
        1. 立即回傳 202 Accepted
        2. 在背景執行爬取任務
        3. 完成後回呼到指定的 callback_url
      operationId: triggerFetch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchTriggerRequest'
            examples:
              mikanani:
                summary: Mikanani RSS 源
                value:
                  subscription_id: 123
                  rss_url: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
                  callback_url: "http://core-service:8000/raw-fetcher-results"
      responses:
        '202':
          description: 爬取任務已接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchTriggerResponse'
        '400':
          description: 請求格式錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search:
    post:
      tags:
        - Search
      summary: 搜尋動畫
      description: 根據關鍵字搜尋動畫，回傳可進一步查詢詳情的結果列表
      operationId: searchAnime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              searchByTitle:
                summary: 以標題搜尋
                value:
                  query: "葬送的芙莉蓮"
      responses:
        '200':
          description: 搜尋結果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          description: 請求格式錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /detail:
    post:
      tags:
        - Search
      summary: 取得動畫詳情
      description: 根據 detail_key 取得動畫的字幕組列表與對應 RSS URL
      operationId: getDetail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetailRequest'
            examples:
              byDetailKey:
                summary: 以 detail_key 查詢
                value:
                  detail_key: "bangumi:3822"
      responses:
        '200':
          description: 動畫詳情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
        '400':
          description: 請求格式錯誤
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /can-handle-subscription:
    post:
      tags:
        - Ownership
      summary: 檢查 URL 歸屬
      description: 檢查此 Fetcher 是否可以處理指定的訂閱 URL
      operationId: canHandleSubscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CanHandleRequest'
            examples:
              mikanani:
                summary: Mikanani RSS URL
                value:
                  source_url: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
                  source_type: "rss"
      responses:
        '200':
          description: 可以處理此 URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanHandleResponse'
        '204':
          description: 無法處理此 URL

components:
  schemas:
    FetchTriggerRequest:
      type: object
      required:
        - subscription_id
        - rss_url
        - callback_url
      properties:
        subscription_id:
          type: integer
          description: 訂閱 ID
          example: 123
        rss_url:
          type: string
          format: uri
          description: RSS 源的完整 URL
          example: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
        callback_url:
          type: string
          format: uri
          description: 爬取完成後的回呼 URL
          example: "http://core-service:8000/raw-fetcher-results"

    FetchTriggerResponse:
      type: object
      required:
        - accepted
        - message
      properties:
        accepted:
          type: boolean
          example: true
        message:
          type: string
          example: "Fetch task accepted for subscription 123"

    SearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: 搜尋關鍵字
          example: "葬送的芙莉蓮"

    SearchResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'

    SearchResult:
      type: object
      required:
        - title
        - detail_key
      properties:
        title:
          type: string
          description: 動畫標題
          example: "葬送的芙莉蓮"
        thumbnail_url:
          type: string
          nullable: true
          description: 封面縮圖 URL
          example: "https://mikanani.me/images/Bangumi/202309/xxx.jpg"
        detail_key:
          type: string
          description: 用於查詢詳情的不透明 key（例如 bangumi:3822）
          example: "bangumi:3822"

    DetailRequest:
      type: object
      required:
        - detail_key
      properties:
        detail_key:
          type: string
          description: 來自 SearchResult 的 detail_key
          example: "bangumi:3822"

    DetailResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DetailItem'

    DetailItem:
      type: object
      required:
        - subgroup_name
        - rss_url
      properties:
        subgroup_name:
          type: string
          description: 字幕組名稱
          example: "喵萌奶茶屋"
        rss_url:
          type: string
          format: uri
          description: 此字幕組的 RSS URL
          example: "https://mikanani.me/RSS/Bangumi?bangumiId=3822&subgroupid=583"

    CanHandleRequest:
      type: object
      required:
        - source_url
        - source_type
      properties:
        source_url:
          type: string
          format: uri
          example: "https://mikanani.me/RSS/Bangumi?bangumiId=3215"
        source_type:
          type: string
          example: "rss"

    CanHandleResponse:
      type: object
      required:
        - can_handle
      properties:
        can_handle:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: "Invalid request format"
